<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1b2550"/>
      <stop offset="55%" stop-color="#121a39"/>
      <stop offset="100%" stop-color="#080c1f"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#ffc97a" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#58e4ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#58e4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- subtle nebula -->
  <g filter="url(#soft)" opacity="0.35">
    <circle cx="340" cy="350" r="120" fill="#5a4dff"/>
    <circle cx="700" cy="330" r="110" fill="#2ad6ff"/>
    <circle cx="640" cy="690" r="150" fill="#3ec3ff"/>
    <circle cx="380" cy="710" r="130" fill="#8f59ff"/>
  </g>

  <!-- reconstruction shards -->
  <g fill="#76eeff" fill-opacity="0.28" stroke="#b8f7ff" stroke-opacity="0.45" stroke-width="1.5">
    <polygon points="177,461 191,470 172,481"/>
    <polygon points="211,373 226,381 206,394"/>
    <polygon points="285,292 300,301 281,312"/>
    <polygon points="380,236 394,245 375,256"/>
    <polygon points="490,212 503,221 484,232"/>
    <polygon points="600,226 613,236 593,246"/>
    <polygon points="700,276 714,286 694,298"/>
    <polygon points="782,356 796,366 776,378"/>
    <polygon points="836,460 851,470 831,482"/>
    <polygon points="829,573 844,583 824,595"/>
    <polygon points="778,676 793,685 773,697"/>
    <polygon points="695,754 710,763 690,775"/>
    <polygon points="592,799 606,808 587,821"/>
    <polygon points="482,812 496,821 477,833"/>
    <polygon points="374,794 388,803 369,815"/>
    <polygon points="278,739 292,748 273,760"/>
    <polygon points="203,657 217,666 198,678"/>
    <polygon points="174,560 188,569 169,581"/>
  </g>

  <!-- orbit rings -->
  <g fill="none">
    <circle cx="512" cy="512" r="248" stroke="#67e8ff" stroke-opacity="0.48" stroke-width="3"/>
    <circle cx="512" cy="512" r="300" stroke="#866cff" stroke-opacity="0.35" stroke-width="2"/>
    <circle cx="512" cy="512" r="356" stroke="#59d5dd" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- micro swarm nodes -->
  <g>
    <circle cx="512" cy="212" r="11" fill="#95f5ff"/>
    <circle cx="671" cy="257" r="9" fill="#95f5ff"/>
    <circle cx="779" cy="378" r="10" fill="#95f5ff"/>
    <circle cx="812" cy="540" r="9" fill="#95f5ff"/>
    <circle cx="758" cy="692" r="10" fill="#95f5ff"/>
    <circle cx="625" cy="785" r="9" fill="#95f5ff"/>
    <circle cx="462" cy="810" r="10" fill="#95f5ff"/>
    <circle cx="311" cy="759" r="9" fill="#95f5ff"/>
    <circle cx="221" cy="633" r="10" fill="#95f5ff"/>
    <circle cx="209" cy="470" r="9" fill="#95f5ff"/>
    <circle cx="275" cy="318" r="10" fill="#95f5ff"/>
    <circle cx="398" cy="234" r="9" fill="#95f5ff"/>
  </g>

  <!-- central glow -->
  <circle cx="512" cy="512" r="230" fill="url(#coreGlow)"/>

  <!-- prime sigil -->
  <g transform="translate(512 512)">
    <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="#204267" fill-opacity="0.55" stroke="#aaf6ff" stroke-width="6"/>
    <circle cx="0" cy="0" r="34" fill="#ffc781" stroke="#fff0d5" stroke-width="3"/>
    <line x1="-10" y1="-114" x2="-24" y2="-142" stroke="#7ff1ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-118" x2="0" y2="-148" stroke="#7ff1ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="-114" x2="24" y2="-142" stroke="#7ff1ff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- vignette -->
  <rect width="1024" height="1024" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="38"/>
</svg>
